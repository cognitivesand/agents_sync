# Pytest config for the greenfield rebuild scope only (src_new/ + tests_new/).
# Run as its own stage: `uv run pytest -c pytest_new.ini`.
# `pythonpath = src_new` is inserted at the front of sys.path, so `import
# agents_sync` resolves to the rebuild rather than the editable install of src/
# (a plain .pth that appends src). This config is never used by the default
# `pytest` run (which is pinned to tests/ in pyproject), so the repoint cannot
# leak into the conformance suite.
[pytest]
pythonpath = src_new
testpaths = tests_new
