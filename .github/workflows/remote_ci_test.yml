name: Remote CI tests

# Linux verification (ruff, mypy --strict, full pytest) runs locally via
# ./scripts/ci.sh, enforced automatically by the .githooks/pre-push hook —
# that is the project's primary CI gate. This workflow runs only the checks
# that cannot be reproduced on a Linux developer machine. Today that is the
# Windows pytest job (msvcrt file locking, path handling); a macOS job can be
# added here the same way if macOS-only behaviour ever needs remote coverage.

on:
  push:
  pull_request:

jobs:
  windows-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install deps
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest
