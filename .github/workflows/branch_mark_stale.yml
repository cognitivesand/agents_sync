name: Mark merged branch stale

# When a PR that merged B into A is closed, rename the head branch B to
# stale/<YYYY-MM-DD>/<B> and delete the original. Only B (the head) is ever
# touched — the base A is never modified, because the script only acts on the
# head ref. The date is the merge date; "Delete old stale branches" reads it
# back to apply the 30-day deletion clock.

on:
  pull_request:
    types: [closed]

jobs:
  rename:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const ref = context.payload.pull_request.head.ref;
            const sha = context.payload.pull_request.head.sha;
            const stamp = new Date().toISOString().slice(0, 10);  // merge date, UTC
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/stale/${stamp}/${ref}`,
              sha,
            });
            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${ref}`,
            });
            core.info(`Marked ${ref} stale as stale/${stamp}/${ref}`);
