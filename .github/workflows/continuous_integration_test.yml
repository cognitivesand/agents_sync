name: Windows tests

# Linux verification (ruff, mypy --strict, full pytest) runs locally via
# ./scripts/ci.sh before every push — that is the project's primary CI gate.
# GitHub runs only the Windows pytest job, because Windows-specific runtime
# behaviour (msvcrt file locking, path handling) cannot be reproduced on a
# Linux developer machine. macOS needs no runner: its installer tests are
# simulated and pass under the local Linux gate.

on:
  push:
  pull_request:

jobs:
  windows-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install deps
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest
