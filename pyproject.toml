[project]
name = "agents_sync"
version = "0.2.0"
description = "Bidirectional sync of Claude Code agents and skills with Codex (Phase 1: structural rename of claude-codex-sync v0.1, no behaviour change yet)."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "PyYAML>=6.0.2",
]

[project.scripts]
agents-sync = "agents_sync.cli:main"

[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agents_sync"]
