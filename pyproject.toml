[project]
name = "claude-codex-sync"
version = "0.1.0"
description = "Sync Claude Code agents and skills into Codex agents and skills."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "PyYAML>=6.0.2",
]

[project.scripts]
claude-codex-sync = "claude_codex_sync.cli:main"

[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/claude_codex_sync"]
